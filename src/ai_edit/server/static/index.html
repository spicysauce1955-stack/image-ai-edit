<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>image-ai-edit</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header>
    <h1>image-ai-edit</h1>
    <p class="muted">Place a reference object into a scene photo. Powered by Gemini 2.5 Flash Image.</p>
  </header>

  <main>
    <!-- Left column: inputs -->
    <section class="inputs card">
      <h2>Inputs</h2>

      <div class="drops">
        <div class="drop" data-target="scene">
          <span class="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 5h18v14H3z"/><circle cx="8" cy="10" r="1.5"/><path d="M21 17l-6-6-8 8"/></svg>
            <span>Scene</span>
            <small>The photo to edit into</small>
          </span>
          <input type="file" name="scene" accept="image/*" />
        </div>
        <div class="drop" data-target="reference">
          <span class="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M2 12h20"/></svg>
            <span>Reference</span>
            <small>The object to insert</small>
          </span>
          <input type="file" name="reference" accept="image/*" />
        </div>
      </div>

      <label class="field">
        <span class="label">Instruction</span>
        <textarea id="instruction" rows="3" placeholder="e.g. place this fence along the back edge of the lawn">place this fence along the back edge of the lawn</textarea>
      </label>

      <details class="advanced">
        <summary>Advanced</summary>
        <label class="field">
          <span class="label">Segment <small class="muted">(Grounded-SAM, comma-sep labels)</small></span>
          <input id="segment" type="text" placeholder="e.g. ground,trees,sky" />
        </label>
        <label class="field">
          <span class="label">Relight <small class="muted">(IC-Light prompt — restyles objects, use sparingly)</small></span>
          <input id="relight" type="text" placeholder="e.g. warm afternoon sun from the right" />
        </label>
      </details>

      <button id="generate" class="primary">
        <span class="label">Generate</span>
        <span class="spinner" hidden></span>
      </button>
      <div id="status" class="status muted"></div>
    </section>

    <!-- Right column: result + history -->
    <section class="output card">
      <h2>Result</h2>

      <div id="canvas" class="canvas empty">
        <div class="empty-state muted">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg>
          <p>Drop a scene + reference and hit Generate.</p>
        </div>
      </div>

      <form id="refine" hidden>
        <input type="text" id="refine-input" placeholder="Refine: 'move it left', 'remove the umbrella', 'make it taller'…" />
        <button type="submit">Refine</button>
      </form>

      <div class="history">
        <h3>History</h3>
        <div id="history-list" class="history-list">
          <p class="muted small">Each generation lands here. Click a thumbnail to bring it back.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js" type="module"></script>
</body>
</html>
