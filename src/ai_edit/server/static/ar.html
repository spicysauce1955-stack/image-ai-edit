<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>image-ai-edit · AR view</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font: 15px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 980px; margin: 0 auto; padding: 1rem;
    }
    h1 { font-size: 1.2rem; margin-bottom: 0.25rem; }
    .sub { color: #888; margin-bottom: 1rem; }
    model-viewer {
      width: 100%; height: 70vh; min-height: 420px;
      background: #f4f4f7; border-radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      model-viewer { background: #1c1c20; }
    }
    .links { margin-top: 1rem; color: #888; font-size: 0.9rem; }
    .links a { color: inherit; }
    .ar-button {
      background: #4a9; color: white; border: 0; border-radius: 6px;
      padding: 0.5rem 0.9rem; font: inherit; font-weight: 600;
      position: absolute; bottom: 16px; right: 16px;
    }
  </style>
  <!-- model-viewer is the Google web component that handles WebGL
       rendering, AR Quick Look on iOS, and Scene Viewer on Android
       from a single <model-viewer> tag. -->
  <script type="module" src="https://unpkg.com/@google/model-viewer@4/dist/model-viewer.min.js"></script>
</head>
<body>
  <h1>AR preview</h1>
  <p class="sub">Tap "View in your space" on a phone to place it in the room. iOS uses Quick Look (USDZ); Android uses Scene Viewer (GLB).</p>

  <model-viewer
    src="/ar/__AR_ID__/model.glb"
    ios-src="/ar/__AR_ID__/model.usdz"
    alt="Generated 3D model"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    auto-rotate
    autoplay>
    <button slot="ar-button" class="ar-button">View in your space</button>
  </model-viewer>

  <div class="links">
    Direct downloads:
    <a href="/ar/__AR_ID__/model.glb" download>model.glb</a> ·
    <a href="/ar/__AR_ID__/model.usdz" download>model.usdz</a>
  </div>
</body>
</html>
